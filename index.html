<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mova Identify Card</title>

  <!-- QR Scanner Library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- Firebase -->
  <script type="module">

    // =========================
    // FIREBASE IMPORTS
    // =========================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getDatabase,
      ref,
      get,
      child
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


    // =========================
    // FIREBASE CONFIG
    // =========================
    // YOUR FIREBASE CONFIG HERE

    const firebaseConfig = {

  apiKey: "AIzaSyCQi9qjhhgh1VBBQIGA6NHyjQy0bdLmuWI",

  authDomain: "mova-id.firebaseapp.com",

  databaseURL:
  "https://mova-id-default-rtdb.asia-southeast1.firebasedatabase.app",

  projectId: "mova-id",

  storageBucket: "mova-id.firebasestorage.app",

  messagingSenderId: "1032823619174",

  appId:
  "1:1032823619174:web:b3dc46b0cb442e51caf7a7",

  measurementId: "G-2BLNYQE0YT"

};


    // =========================
    // FIREBASE INIT
    // =========================
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);


    // =========================
    // SEARCH FUNCTION
    // =========================
    async function searchUser(id) {

      if (!id) {
        alert("Enter ID Number");
        return;
      }

      try {

        const dbRef = ref(db);

        const snapshot = await get(child(dbRef, "users/" + id));

        if (snapshot.exists()) {

          const data = snapshot.val();

          document.getElementById("result").style.display = "block";

          document.getElementById("userPhoto").src = data.photo;
          document.getElementById("userName").innerText = data.name;
          document.getElementById("userId").innerText = data.id;
          document.getElementById("userPhone").innerText = data.phone;
          document.getElementById("userEmail").innerText = data.email;
          document.getElementById("userAddress").innerText = data.address;

        } else {

          alert("User Not Found");

        }

      } catch (error) {

        console.log(error);
        alert("Error Fetching Data");

      }
    }


    // =========================
    // BUTTON SEARCH
    // =========================
    window.searchData = function () {

      const id =
        document.getElementById("searchInput").value;

      searchUser(id);

    };


    // =========================
    // QR SCANNER
    // =========================
    function onScanSuccess(decodedText) {

      document.getElementById("searchInput").value =
        decodedText;

      searchUser(decodedText);

    }

    const scanner = new Html5QrcodeScanner(
      "reader",
      {
        fps: 10,
        qrbox: 250
      }
    );

    scanner.render(onScanSuccess);

  </script>


  <style>
    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#ffe6f0;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
  background:#fff0f5;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(255,105,180,0.2);
}

h1{
  text-align:center;
  margin-bottom:20px;
  color:#ff1493;
}

.search-box{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.search-box input{
  flex:1;
  padding:12px;
  border:2px solid #ffb6c1;
  border-radius:12px;
  font-size:16px;
  background:#fff;
  color:#d63384;
}

.search-box input:focus{
  outline:none;
  border-color:#ff69b4;
  box-shadow:0 0 10px rgba(255,105,180,0.3);
}

.search-box button{
  padding:12px 20px;
  border:none;
  background:#ff69b4;
  color:white;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

.search-box button:hover{
  background:#ff1493;
  transform:scale(1.05);
}

#reader{
  width:100%;
  margin-top:20px;
  border-radius:15px;
  overflow:hidden;
}

.card{
  margin-top:25px;
  padding:20px;
  border-radius:20px;
  background:#ffd6e8;
  display:none;
  box-shadow:0 0 15px rgba(255,105,180,0.2);
}

.card img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:50%;
  display:block;
  margin:auto;
  border:5px solid #ff69b4;
}

.details{
  margin-top:20px;
}

.details p{
  margin:10px 0;
  font-size:16px;
  color:#c2185b;
}

.label{
  font-weight:bold;
  color:#ff1493;
}
  </style>

</head>
<body>

  <div class="container">

    <h1>MOVA IDENTIFY CARD </h1>

    <div class="search-box">

      <input
        type="text"
        id="searchInput"
        placeholder="Enter ID Number"
      >

      <button onclick="searchData()">
        Search
      </button>

    </div>

    <!-- QR SCANNER -->
    <div id="reader"></div>

    <!-- RESULT CARD -->
    <div class="card" id="result">

      <img id="userPhoto" src="" alt="Photo">

      <div class="details">

        <p>
          <span class="label">Name :</span>
          <span id="userName"></span>
        </p>

        <p>
          <span class="label">ID :</span>
          <span id="userId"></span>
        </p>

        <p>
          <span class="label">Phone :</span>
          <span id="userPhone"></span>
        </p>

        <p>
          <span class="label">Email :</span>
          <span id="userEmail"></span>
        </p>

        <p>
          <span class="label">Address :</span>
          <span id="userAddress"></span>
        </p>

      </div>

    </div>

  </div>

</body>
</html>
